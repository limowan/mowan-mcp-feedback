name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          TOML_VERSION=$(grep '^version =' pyproject.toml | cut -d'"' -f2)
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "toml=$TOML_VERSION" >> $GITHUB_OUTPUT

          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($TOML_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Build package
        run: uv build

      - name: Check package
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ steps.version.outputs.tag }}
        run: |
          cat > release-notes.md <<EOF
          ## mowan-mcp-feedback ${TAG_NAME}

          ### 安装

          \`\`\`bash
          # 使用 uvx
          uvx mowan-mcp-feedback@${PACKAGE_VERSION}

          # 使用 pip
          pip install mowan-mcp-feedback==${PACKAGE_VERSION}
          \`\`\`

          ### 链接
          - [PyPI](https://pypi.org/project/mowan-mcp-feedback/${PACKAGE_VERSION}/)
          - [完整更新日志](https://github.com/limowan/mowan-mcp-feedback/commits/${TAG_NAME})
          EOF

          gh release create "${TAG_NAME}" \
            --title "Release ${TAG_NAME}" \
            --notes-file release-notes.md
